<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mi Bombonera">
<meta name="theme-color" content="#001a4d">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<title>Mi Bombonera</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#00102e;--bg2:#001540;--bg3:#001a4d;
  --gold:#F5C518;--gold2:rgba(245,197,24,0.15);
  --text:#ffffff;--text2:rgba(255,255,255,0.55);--text3:rgba(255,255,255,0.25);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --green:#4ade80;--greenbg:rgba(74,222,128,0.12);
  --red:#f87171;--redbg:rgba(248,113,113,0.12);
  --r:10px;--rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrap{max-width:640px;margin:0 auto;padding-bottom:80px}
 
/* HERO */
.hero{position:relative;height:280px;overflow:hidden}
.hero img{width:100%;height:100%;object-fit:cover;filter:brightness(0.18) saturate(0.6) hue-rotate(200deg)}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(0,16,46,0.6) 55%,rgba(0,16,46,0.2) 100%)}
.hero-glow{position:absolute;top:-40px;right:-40px;width:280px;height:280px;background:radial-gradient(circle,rgba(245,197,24,0.08) 0%,transparent 70%);pointer-events:none}
.hero-glow2{position:absolute;bottom:-60px;left:-60px;width:240px;height:240px;background:radial-gradient(circle,rgba(0,48,135,0.4) 0%,transparent 70%);pointer-events:none}
.hero-cnt{position:absolute;bottom:0;left:0;right:0;padding:1.5rem 1.25rem 1.25rem}
.hero-pill{display:inline-flex;align-items:center;gap:6px;border:0.5px solid rgba(245,197,24,0.35);color:rgba(245,197,24,0.75);font-size:9px;font-weight:600;padding:3px 12px;border-radius:20px;letter-spacing:.14em;margin-bottom:10px}
.hero-title{font-size:30px;font-weight:700;color:#fff;line-height:1.05;letter-spacing:-.01em}
.hero-title span{color:var(--gold)}
.hero-sub{font-size:10px;color:var(--text3);margin-top:5px;letter-spacing:.08em}
.hero-line{position:absolute;bottom:0;left:1.25rem;right:1.25rem;height:0.5px;background:linear-gradient(to right,var(--gold),transparent)}
 
/* MAIN */
.main{background:var(--bg);padding:1.25rem 1rem 1rem}
 
/* STATS */
.sg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:1.25rem}
.sc{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:.85rem .6rem;text-align:center;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(to right,var(--gold),transparent)}
.sl{font-size:9px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.sv{font-size:22px;font-weight:700;color:var(--gold);line-height:1}
.ss{font-size:9px;color:var(--text3);margin-top:2px}
 
/* TABS */
.tabs{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:1rem;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 16px;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;white-space:nowrap;letter-spacing:.04em;flex-shrink:0;transition:all .15s}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
 
/* FILTERS */
.flt{display:flex;gap:6px;margin-bottom:1rem;overflow-x:auto;padding-bottom:2px}
.flt::-webkit-scrollbar{display:none}
.fb{padding:5px 14px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;font-size:11px;color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0;font-weight:600;font-family:inherit;transition:all .15s}
.fb.active{background:var(--gold);color:#001a4d;border-color:var(--gold)}
 
/* MATCHES */
.ml{display:flex;flex-direction:column;gap:6px}
.mr{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);cursor:pointer;overflow:hidden;transition:border-color .15s}
.mr:hover{border-color:var(--border2)}
.mr.open{border-color:rgba(245,197,24,0.4);background:var(--bg3)}
.mr.extra{border-left:2px solid rgba(0,96,200,0.6)}
.mr-top{display:grid;grid-template-columns:72px 1fr auto auto;align-items:center;gap:8px;padding:11px 12px}
.mdt{font-size:10px;color:var(--text3);line-height:1.4}
.mrv{font-size:13px;font-weight:600;color:var(--text)}
.msw{text-align:center}
.msm{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--gold);line-height:1.1}
.msp{font-size:9px;color:var(--text3);margin-top:1px}
.mex{display:none;padding:10px 12px;border-top:0.5px solid var(--border);gap:7px;flex-direction:column}
.mr.open .mex{display:flex}
.mxr{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);flex-wrap:wrap}
.gc{background:var(--greenbg);color:var(--green);padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
 
.ytb{display:inline-flex;align-items:center;gap:5px;background:#FF0000;color:#fff;border:none;border-radius:4px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;text-decoration:none;font-family:inherit}
.ytb svg{width:12px;height:12px;fill:#fff}
.del{background:transparent;border:0.5px solid var(--border);color:var(--text3);border-radius:4px;padding:3px 10px;font-size:10px;cursor:pointer;margin-left:auto;font-family:inherit}
 
.badge{display:inline-block;padding:2px 9px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.02em}
.bl{background:rgba(100,150,255,0.12);color:#7aabff}
.bb{background:rgba(74,222,128,0.12);color:#4ade80}
.bs{background:rgba(251,191,36,0.12);color:#fbbf24}
.bw{background:var(--greenbg);color:var(--green)}
.bd{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.3)}
.br{background:var(--redbg);color:var(--red)}
 
.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:13px;margin-top:8px;background:transparent;border:0.5px dashed var(--border2);border-radius:var(--r);color:var(--text3);font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
.add-btn:hover{border-color:rgba(245,197,24,0.4);color:var(--gold)}
 
/* MODAL */
.mb{display:none;position:fixed;inset:0;background:rgba(0,8,24,0.92);z-index:200;align-items:flex-end;justify-content:center}
.mb.open{display:flex}
.modal{background:var(--bg2);border-radius:var(--rl) var(--rl) 0 0;border-top:1px solid rgba(245,197,24,0.25);padding:1.25rem 1.25rem 2.5rem;width:100%;max-width:640px;max-height:92vh;overflow-y:auto}
.mh{width:36px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 1rem}
.modal h3{font-size:20px;font-weight:700;color:var(--gold);margin-bottom:1rem}
.fr{margin-bottom:12px}
.fr label{display:block;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.fr input,.fr select{width:100%;padding:10px 12px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);font-size:14px;font-family:inherit;-webkit-appearance:none;appearance:none}
.fr input::placeholder{color:var(--text3)}
.fbtns{display:flex;gap:10px;margin-top:1.25rem}
.bc{flex:1;padding:13px;border:0.5px solid var(--border2);background:transparent;border-radius:var(--r);font-size:14px;cursor:pointer;color:var(--text2);font-family:inherit;font-weight:600}
.bsave{flex:2;padding:13px;background:var(--gold);border:none;border-radius:var(--r);font-size:14px;cursor:pointer;color:#001a4d;font-weight:700;font-family:inherit}
 
/* SCORERS */
.sr{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.sr:last-child{border-bottom:none}
.srk{font-size:16px;font-weight:700;color:var(--text3);width:24px;text-align:center;flex-shrink:0}
.srk.top{color:var(--gold)}
.sb{width:36px;height:36px;border-radius:50%;background:var(--bg2);border:1px solid rgba(245,197,24,0.3);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.sn{font-size:13px;font-weight:600;color:var(--text)}
.sbb{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:5px}
.sbf{height:100%;background:var(--gold);border-radius:2px}
.sg2{font-size:20px;font-weight:700;color:var(--gold);min-width:28px;text-align:right}
 
/* STATS TAB */
.st{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.yr{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.yl{font-size:11px;color:var(--text3);width:36px;flex-shrink:0;font-weight:600}
.bb2{flex:1;background:var(--bg2);border-radius:4px;height:22px;overflow:hidden}
.bf{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:#001a4d}
.secg{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:1.5rem}
.si{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:.75rem 1rem;display:flex;justify-content:space-between;align-items:center}
.cw{position:relative;width:100%;height:220px;margin-top:.5rem}
 
.avg-card{background:var(--bg2);border:0.5px solid var(--border);border-left:2px solid var(--gold);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;justify-content:space-between;align-items:center}
.avg-l{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.avg-v{font-size:32px;font-weight:700;color:var(--gold)}
.avg-s{font-size:10px;color:var(--text3);margin-top:2px;text-align:right}
</style>
</head>
<body>
<div class="wrap">
 
<div class="hero">
  <img src="icon.png" alt="La Bombonera">
  <div class="hero-grad"></div>
  <div class="hero-glow"></div>
  <div class="hero-glow2"></div>
  <div class="hero-line"></div>
  <div class="hero-cnt">
    <div class="hero-pill">🔵 XENEIZE · LA BOCA · BS AS</div>
    <div class="hero-title">Mi historial en<br><span>La Bombonera</span></div>
    <div class="hero-sub">Estadio Alberto J. Armando · desde noviembre 2021</div>
  </div>
</div>
 
<div class="main">
  <div class="sg" id="sg"></div>
  <div class="tabs">
    <div class="tab active" onclick="sTab(this,'p')">Partidos</div>
    <div class="tab" onclick="sTab(this,'g')">Goleadores</div>
    <div class="tab" onclick="sTab(this,'s')">Estadísticas</div>
  </div>
 
  <div id="tp">
    <div class="flt" id="flt"></div>
    <div class="ml" id="ml"></div>
    <button class="add-btn" onclick="openM()">＋ Agregar partido</button>
  </div>
 
  <div id="tg" style="display:none">
    <p style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:1rem">Goles de Boca en tus partidos</p>
    <div id="sl"></div>
  </div>
 
  <div id="ts" style="display:none">
    <div class="avg-card">
      <div><div class="avg-l">Promedio goles / partido</div><div class="avg-s" id="avgs"></div></div>
      <div class="avg-v" id="avgv"></div>
    </div>
    <div class="st">Partidos por año</div>
    <div id="yb" style="margin-bottom:1.5rem"></div>
    <div class="st">Sector</div>
    <div class="secg" id="secg"></div>
    <div class="st">Resultados</div>
    <div class="cw"><canvas id="pc"></canvas></div>
  </div>
</div>
</div>
 
<!-- MODAL -->
<div class="mb" id="mb" onclick="bgc(event)">
  <div class="modal">
    <div class="mh"></div>
    <h3>Agregar partido</h3>
    <div class="fr"><label>Rival</label><input type="text" id="fr" placeholder="Ej: River" autocomplete="off"></div>
    <div class="fr"><label>Resultado (Boca - Rival)</label><input type="text" id="fsc" placeholder="Ej: 2-1" autocomplete="off"></div>
    <div class="fr"><label>Penales (opcional, ej: 5-4)</label><input type="text" id="fp" placeholder="Solo si hubo penales" autocomplete="off"></div>
    <div class="fr"><label>Fecha</label><input type="date" id="fd"></div>
    <div class="fr"><label>Torneo</label>
      <select id="ft"><option>Liga profesional</option><option>Libertadores</option><option>Sudamérica</option><option>Copa Argentina</option></select>
    </div>
    <div class="fr"><label>Sector</label>
      <select id="fse"><option>Platea media</option><option>Platea baja</option><option>Platea alta</option><option>Preferencial</option><option>Popular</option><option>Palco</option></select>
    </div>
    <div class="fr"><label>Goleadores de Boca (separados por coma)</label><input type="text" id="fg" placeholder="Ej: Merentiel, Cavani" autocomplete="off"></div>
    <div class="fbtns">
      <button class="bc" onclick="closeM()">Cancelar</button>
      <button class="bsave" onclick="saveM()">Guardar partido</button>
    </div>
  </div>
</div>
 
<script>
const BASE=[
  {rival:"Newell's",score:"0-0",pen:null,sector:"Platea media",date:"2021-11-30",torneo:"Liga profesional",goals:[]},
  {rival:"Rosario Central",score:"2-1",pen:null,sector:"Platea baja",date:"2022-02-20",torneo:"Liga profesional",goals:["Izquierdoz","Fabra"]},
  {rival:"Huracán",score:"0-1",pen:null,sector:"Platea media",date:"2022-03-06",torneo:"Liga profesional",goals:[]},
  {rival:"Arsenal",score:"2-2",pen:null,sector:"Platea media",date:"2022-04-02",torneo:"Liga profesional",goals:["Benedetto","Villa"]},
  {rival:"Always Ready",score:"2-0",pen:null,sector:"Platea media",date:"2022-04-12",torneo:"Libertadores",goals:["Benedetto","Villa"]},
  {rival:"Defensa y Justicia",score:"2-0",pen:null,sector:"Platea baja",date:"2022-05-10",torneo:"Liga profesional",goals:["Benedetto","Salvio"]},
  {rival:"Tigre",score:"3-0",pen:null,sector:"Córdoba",date:"2022-05-22",torneo:"Liga profesional",goals:["Benedetto","Villa","Zeballos"]},
  {rival:"Tigre",score:"5-3",pen:null,sector:"Platea baja",date:"2022-06-15",torneo:"Liga profesional",goals:["Benedetto","Benedetto","Villa","Advíncula","Ramírez J."]},
  {rival:"Corinthians",score:"0-0",pen:"5-6",sector:"Platea media",date:"2022-07-05",torneo:"Libertadores",goals:[]},
  {rival:"Estudiantes",score:"3-1",pen:null,sector:"Platea media",date:"2022-07-24",torneo:"Liga profesional",goals:["Benedetto","Villa","Zeballos"]},
  {rival:"Rosario Central",score:"0-0",pen:null,sector:"Platea media",date:"2022-08-17",torneo:"Liga profesional",goals:[]},
  {rival:"Atlético Tucumán",score:"2-1",pen:null,sector:"Platea media",date:"2022-08-28",torneo:"Liga profesional",goals:["Langoni","Langoni"]},
  {rival:"River",score:"1-0",pen:null,sector:"Platea media",date:"2022-09-11",torneo:"Liga profesional",goals:["Benedetto"]},
  {rival:"Independiente",score:"2-2",pen:null,sector:"Platea media",date:"2022-10-23",torneo:"Liga profesional",goals:["G.Fernández","Villa"]},
  {rival:"Sarmiento",score:"2-0",pen:null,sector:"Platea media",date:"2023-07-02",torneo:"Liga profesional",goals:["Medina","Merentiel"]},
  {rival:"Newell's",score:"2-1",pen:null,sector:"Platea media",date:"2023-07-24",torneo:"Liga profesional",goals:["Medina","Merentiel"]},
  {rival:"Nacional",score:"2-2",pen:"4-2",sector:"Platea alta",date:"2023-08-09",torneo:"Libertadores",goals:["Merentiel","Medina"]},
  {rival:"Racing",score:"0-0",pen:null,sector:"Platea alta",date:"2023-08-23",torneo:"Libertadores",goals:[]},
  {rival:"Belgrano",score:"3-2",pen:null,sector:"Platea baja",date:"2024-03-03",torneo:"Liga profesional",goals:["Cavani","Cavani","Cavani"]},
  {rival:"Trinidense",score:"1-0",pen:null,sector:"Platea media",date:"2024-04-09",torneo:"Sudamérica",goals:["Cavani"]},
  {rival:"Talleres",score:"0-0",pen:null,sector:"Preferencial",date:"2024-05-25",torneo:"Liga profesional",goals:[]},
  {rival:"Nacional Potosí",score:"4-0",pen:null,sector:"Platea alta",date:"2024-05-29",torneo:"Sudamérica",goals:["Cavani","Merentiel","Medina","Zenón"]},
  {rival:"Banfield",score:"3-0",pen:null,sector:"Platea media",date:"2024-08-01",torneo:"Liga profesional",goals:["Merentiel","Cavani","Medina"]},
  {rival:"Barracas Central",score:"1-1",pen:null,sector:"Platea media",date:"2024-08-04",torneo:"Liga profesional",goals:["Merentiel"]},
  {rival:"Cruzeiro",score:"1-0",pen:null,sector:"Platea alta",date:"2024-08-15",torneo:"Sudamérica",goals:["Merentiel"]},
  {rival:"San Lorenzo",score:"3-2",pen:null,sector:"Platea media",date:"2024-08-18",torneo:"Liga profesional",goals:["Aguirre","Medina","Merentiel"]},
  {rival:"Rosario Central",score:"2-1",pen:null,sector:"Platea baja",date:"2024-08-31",torneo:"Liga profesional",goals:["Lema","Aguirre"]},
  {rival:"Deportivo Riestra",score:"1-1",pen:null,sector:"Platea media",date:"2024-09-27",torneo:"Liga profesional",goals:["Zenón"]},
  {rival:"Unión",score:"1-0",pen:null,sector:"Platea alta",date:"2024-11-20",torneo:"Liga profesional",goals:["Zenón"]},
  {rival:"Gimnasia",score:"1-0",pen:null,sector:"Platea media",date:"2024-12-01",torneo:"Liga profesional",goals:["Merentiel"]},
  {rival:"Barracas Central",score:"1-0",pen:null,sector:"Platea media",date:"2025-04-06",torneo:"Liga profesional",goals:["Battaglia"]},
  {rival:"Instituto",score:"2-0",pen:null,sector:"Platea alta",date:"2026-03-22",torneo:"Liga profesional",goals:["Aranda","Bareiro"]},
];
 
let matches=[],ci=null,af='Todos';
const gex=()=>{try{return JSON.parse(localStorage.getItem('boca-x')||'[]')}catch(e){return[]}};
const sex=(a)=>{try{localStorage.setItem('boca-x',JSON.stringify(a))}catch(e){}};
const load=()=>{matches=[...BASE,...gex()].sort((a,b)=>a.date.localeCompare(b.date))};
const isX=(m)=>!BASE.find(b=>b.date===m.date&&b.rival===m.rival);
 
function getR(m){
  const s=m.score.replace(/\(.*\)/,'').trim().split('-');
  if(s.length<2)return'D';
  const[a,b]=[parseInt(s[0]),parseInt(s[1])];
  if(a>b)return'W';if(a<b)return'L';
  if(m.pen){const p=m.pen.split('-');if(p.length===2)return parseInt(p[0])>parseInt(p[1])?'W':'L';}
  return'D';
}
const fd=(d)=>{try{return new Date(d+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'2-digit'})}catch(e){return d}};
const tc=(t)=>t==='Liga profesional'?'bl':t==='Libertadores'?'bb':'bs';
const ini=(n)=>n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const yt=(r,d)=>`https://www.youtube.com/results?search_query=${encodeURIComponent('Boca vs '+r+' '+d.slice(0,4)+' resumen ESPN')}`;
 
function rStats(ms){
  const w=ms.filter(m=>getR(m)==='W').length,d=ms.filter(m=>getR(m)==='D').length,l=ms.filter(m=>getR(m)==='L').length;
  const g=ms.reduce((a,m)=>a+m.goals.length,0);
  document.getElementById('sg').innerHTML=`
    <div class="sc"><div class="sl">Partidos</div><div class="sv">${ms.length}</div><div class="ss">en la cancha</div></div>
    <div class="sc"><div class="sl">Ganados</div><div class="sv" style="color:#4ade80">${w}</div><div class="ss">${ms.length?Math.round(w/ms.length*100):0}%</div></div>
    <div class="sc"><div class="sl">Goles</div><div class="sv">${g}</div><div class="ss">de Boca</div></div>
    <div class="sc"><div class="sl">Perdidos</div><div class="sv" style="color:#f87171">${l}</div><div class="ss">${d} emp.</div></div>`;
}
 
function rFlt(){
  document.getElementById('flt').innerHTML=['Todos','Liga profesional','Libertadores','Sudamérica']
    .map(t=>`<button class="fb ${t===af?'active':''}" onclick="setF('${t}')">${t}</button>`).join('');
}
 
function scoreH(m){
  return m.pen
    ?`<div class="msw"><div class="msm">${m.score}</div><div class="msp">pen. ${m.pen}</div></div>`
    :`<div class="msw"><div class="msm">${m.score}</div></div>`;
}
 
function rMatches(f){
  const fm=f==='Todos'?[...matches]:matches.filter(m=>m.torneo===f||(f==='Sudamérica'&&m.torneo==='Sudamericana'));
  const sorted=[...fm].sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('ml').innerHTML=sorted.map(m=>{
    const r=getR(m),rC=r==='W'?'bw':r==='L'?'br':'bd',rT=r==='W'?'Ganó':r==='L'?'Perdió':'Empató';
    const x=isX(m);
    const gh=m.goals.length
      ?`<span style="display:flex;gap:5px;flex-wrap:wrap;align-items:center"><span style="font-size:12px">⚽</span>${m.goals.map(g=>`<span class="gc">${g}</span>`).join('')}</span>`
      :`<span style="color:var(--text3);font-size:11px">Sin goles</span>`;
    const del=x?`<button class="del" onclick="delM('${m.date}','${m.rival.replace(/'/g,"\\'")}');event.stopPropagation()">Eliminar</button>`:'';
    return`<div class="mr${x?' extra':''}" onclick="this.classList.toggle('open')">
      <div class="mr-top">
        <span class="mdt">${fd(m.date)}</span>
        <span class="mrv">${m.rival}</span>
        ${scoreH(m)}
        <span class="badge ${rC}">${rT}</span>
      </div>
      <div class="mex">
        <div class="mxr">
          <span class="badge ${tc(m.torneo)}">${m.torneo}</span>
          <span style="color:var(--text3)">·</span>
          <span>📍 ${m.sector}</span>
          ${del}
        </div>
        <div class="mxr">${gh}</div>
        <div class="mxr">
          <a class="ytb" href="${yt(m.rival,m.date)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
            <svg viewBox="0 0 24 24"><path d="M23.5 6.19a3.02 3.02 0 00-2.12-2.14C19.54 3.5 12 3.5 12 3.5s-7.54 0-9.38.55A3.02 3.02 0 00.5 6.19C0 8.04 0 12 0 12s0 3.96.5 5.81a3.02 3.02 0 002.12 2.14C4.46 20.5 12 20.5 12 20.5s7.54 0 9.38-.55a3.02 3.02 0 002.12-2.14C24 15.96 24 12 24 12s0-3.96-.5-5.81zM9.75 15.5v-7l6.5 3.5-6.5 3.5z"/></svg>
            Ver resumen
          </a>
        </div>
      </div>
    </div>`;
  }).join('');
}
 
function setF(f){
  af=f;
  const fm=f==='Todos'?matches:matches.filter(m=>m.torneo===f||(f==='Sudamérica'&&m.torneo==='Sudamericana'));
  rStats(fm);rFlt();rMatches(f);
}
 
function rScorers(){
  const cnt={};matches.forEach(m=>m.goals.forEach(g=>{cnt[g]=(cnt[g]||0)+1}));
  const sorted=Object.entries(cnt).sort((a,b)=>b[1]-a[1]);const mx=sorted[0]?sorted[0][1]:1;
  document.getElementById('sl').innerHTML=sorted.map(([n,g],i)=>`
    <div class="sr">
      <div class="srk ${i<3?'top':''}">${i+1}</div>
      <div class="sb">${ini(n)}</div>
      <div style="flex:1"><div class="sn">${n}</div><div class="sbb"><div class="sbf" style="width:${Math.round(g/mx*100)}%"></div></div></div>
      <div class="sg2">${g}</div>
    </div>`).join('');
}
 
function rYears(){
  const by={};matches.forEach(m=>{const y=m.date.slice(0,4);by[y]=(by[y]||0)+1});
  const mx=Math.max(...Object.values(by));
  const cols={'2021':'#1a3a8f','2022':'#1e4db7','2023':'#1D9E75','2024':'#17a06b','2025':'#c97d10','2026':'#a85fa0'};
  document.getElementById('yb').innerHTML=Object.entries(by).sort().map(([y,c])=>
    `<div class="yr"><span class="yl">${y}</span><div class="bb2"><div class="bf" style="width:${Math.round(c/mx*100)}%;background:${cols[y]||'#1e4db7'}">${c} partidos</div></div></div>`
  ).join('');
}
 
function rSectors(){
  const s={};matches.forEach(m=>{s[m.sector]=(s[m.sector]||0)+1});
  document.getElementById('secg').innerHTML=Object.entries(s).sort((a,b)=>b[1]-a[1])
    .map(([sec,c])=>`<div class="si"><span style="font-size:13px;color:var(--text)">${sec}</span><span style="font-size:13px;font-weight:700;color:var(--gold)">${c}x</span></div>`).join('');
}
 
function rAvg(){
  const total=matches.reduce((a,m)=>a+m.goals.length,0);
  const avg=matches.length?total/matches.length:0;
  document.getElementById('avgv').textContent=avg.toFixed(1);
  document.getElementById('avgs').textContent=`${total} goles en ${matches.length} partidos`;
}
 
function rChart(){
  if(ci)ci.destroy();
  const w=matches.filter(m=>getR(m)==='W').length,d=matches.filter(m=>getR(m)==='D').length,l=matches.filter(m=>getR(m)==='L').length;
  ci=new Chart(document.getElementById('pc'),{
    type:'doughnut',
    data:{labels:[`Ganados (${w})`,`Empatados (${d})`,`Perdidos (${l})`],datasets:[{data:[w,d,l],backgroundColor:['#4ade80','#3a5a8f','#f87171'],borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{color:'rgba(255,255,255,0.45)',font:{size:12},padding:16,usePointStyle:true}}}}
  });
}
 
function rAll(){
  const fm=af==='Todos'?matches:matches.filter(m=>m.torneo===af||(af==='Sudamérica'&&m.torneo==='Sudamericana'));
  rStats(fm);rFlt();rMatches(af);rScorers();rYears();rSectors();rAvg();
}
 
function sTab(el,tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['p','g','s'].forEach(t=>{document.getElementById('t'+t).style.display=t===tab?'block':'none'});
  if(tab==='s')rChart();
}
 
function openM(){document.getElementById('mb').classList.add('open')}
function closeM(){document.getElementById('mb').classList.remove('open')}
function bgc(e){if(e.target===document.getElementById('mb'))closeM()}
 
function saveM(){
  const rival=document.getElementById('fr').value.trim();
  const score=document.getElementById('fsc').value.trim();
  const pen=document.getElementById('fp').value.trim()||null;
  const date=document.getElementById('fd').value;
  const torneo=document.getElementById('ft').value;
  const sector=document.getElementById('fse').value;
  const gr=document.getElementById('fg').value.trim();
  if(!rival||!score||!date){alert('Completá rival, resultado y fecha.');return}
  const goals=gr?gr.split(',').map(g=>g.trim()).filter(Boolean):[];
  const extras=gex();extras.push({rival,score,pen,date,torneo,sector,goals});
  sex(extras);load();closeM();
  ['fr','fsc','fp','fd','fg'].forEach(id=>document.getElementById(id).value='');
  rAll();
}
 
function delM(date,rival){
  if(!confirm('¿Eliminar este partido?'))return;
  sex(gex().filter(m=>!(m.date===date&&m.rival===rival)));load();rAll();
}
 
load();rAll();
</script>
</body>
</html>
